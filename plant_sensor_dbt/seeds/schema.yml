version: 2

seeds:
  - name: limites_plantas_cientifico
    description: >
      Dicionário mestre com os limites biológicos de sobrevivência das plantas.
      Dados consolidados e validados a partir de literatura científica:
      - Instituto Plantarum (Plantas Ornamentais no Brasil).
      - Diretrizes de paisagismo e produção vegetal da ESALQ/USP.
      - Boletins técnicos do Instituto Agronômico de Campinas (IAC).
    columns:
      - name: nome_popular
        description: "Nome comum da planta."
      - name: nome_cientifico
        description: "Nomenclatura botânica oficial."
      - name: temp_min_c
        description: "Temperatura mínima de sobrevivência (Celsius)."
      - name: temp_max_c
        description: "Temperatura máxima suportada (Celsius)."
      - name: umid_ar_min_pct
        description: "Umidade mínima do ar tolerada."
      - name: umid_ar_max_pct
        description: "Umidade máxima do ar tolerada."
      - name: tolerancia_seca
        description: "Classificação biológica de resistência à falta de água (ALTA, MEDIA, BAIXA)."
      - name: lux_min
        description: "Nível mínimo de intensidade luminosa (Lux) para iniciar a fotossíntese útil."
      - name: horas_luz_minimas
        description: "Fotoperíodo ativo: Quantidade mínima de horas de luz diárias necessárias."
      - name: horas_descanso_minimas
        description: "Fotoperíodo inativo: Quantidade mínima de horas de escuridão profunda para respiração celular."

  - name: cadastro_sensores
    description: >
      Tabela de roteamento (De/Para) que vincula o hardware físico à planta monitorada atualmente.
      Permite a troca de plantas sem necessidade de refatorar o código SQL.
    columns:
      - name: dispositivo
        description: "Identificador único do microcontrolador (ex: esp32_c3_supermini)."
        tests:
          - not_null
          - unique
      - name: nome_planta
        description: "Nome popular da planta associada ao dispositivo. Usado como chave para buscar os limites científicos."
        tests:
          - not_null